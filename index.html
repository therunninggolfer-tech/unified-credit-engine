<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCF Unified Credit Engine</title>
<style>
  :root {
    --teal: #366775; --gold: #987F40; --mint: #5FC2A2; --light-blue: #6FB9D5;
    --red: #dc2626; --green: #059669; --amber: #d97706;
    --red-bg: #fee2e2; --green-bg: #d1fae5; --amber-bg: #fef3c7;
    --grey: #6b7280; --grey-bg: #f3f4f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Calibri, Arial, sans-serif; background: #f1f5f9; color: #1f2937; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--teal); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; color: #a5f3fc; margin-top: 2px; }
  .api-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }

  /* ── Layout ── */
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
  .card { background: white; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 16px; overflow: hidden; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
  .card-header h2 { font-size: 14px; font-weight: 700; color: var(--teal); }
  .card-body { padding: 16px 18px; }

  /* ── Form elements ── */
  label { display: block; font-size: 12px; font-weight: 700; color: var(--teal); margin-bottom: 4px; }
  input[type=text], input[type=number], input[type=password], textarea, select {
    width: 100%; padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 6px;
    font-size: 13px; font-family: inherit; background: white;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 2px rgba(54,103,117,0.15); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-group { margin-bottom: 14px; }

  /* ── Upload zones ── */
  .upload-zone { border: 2px dashed #d1d5db; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; background: #fafafa; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--teal); background: #f0f9ff; }
  .upload-zone.loaded { border-color: var(--mint); background: #f0fdf4; }
  .upload-zone span { font-size: 13px; color: #9ca3af; }
  .upload-zone.loaded span { color: var(--teal); font-weight: 600; }
  .file-list { margin-top: 6px; }
  .file-item { display: flex; justify-content: space-between; align-items: center; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 4px 8px; margin-top: 4px; font-size: 11px; color: var(--teal); }
  .file-remove { cursor: pointer; color: var(--red); font-weight: 700; background: none; border: none; font-size: 14px; }

  /* ── Buttons ── */
  .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--teal); color: white; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-outline { background: white; color: var(--teal); border: 2px solid var(--teal); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-full { width: 100%; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  /* ── Asset type toggle ── */
  .toggle-row { display: flex; gap: 10px; }
  .toggle-opt { flex: 1; border: 2px solid #d1d5db; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
  .toggle-opt.active { border-color: var(--teal); background: #f0f9ff; }
  .toggle-opt .opt-label { font-weight: 700; font-size: 13px; color: #374151; }
  .toggle-opt.active .opt-label { color: var(--teal); }
  .toggle-opt .opt-sub { font-size: 11px; color: #6b7280; margin-top: 2px; }

  /* ── Tier badge ── */
  .tier-banner { border-radius: 7px; padding: 10px 14px; margin-top: 12px; }
  .tier-1 { background: #d1fae5; border: 1px solid #6ee7b7; }
  .tier-2 { background: #fef3c7; border: 1px solid #fcd34d; }
  .tier-3 { background: #dbeafe; border: 1px solid #93c5fd; }
  .tier-title { font-weight: 700; font-size: 13px; }
  .tier-1 .tier-title { color: #065f46; }
  .tier-2 .tier-title { color: #92400e; }
  .tier-3 .tier-title { color: #1e40af; }
  .tier-desc { font-size: 12px; margin-top: 3px; }
  .tier-1 .tier-desc { color: #065f46; }
  .tier-2 .tier-desc { color: #78350f; }
  .tier-3 .tier-desc { color: #1e40af; }

  /* ── Bounce selector ── */
  .bounce-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .bounce-btn { padding: 6px 16px; border-radius: 6px; border: 2px solid #d1d5db; background: white; font-weight: 700; font-size: 14px; cursor: pointer; }
  .bounce-btn.b0 { border-color: var(--green); background: var(--green-bg); color: #065f46; }
  .bounce-btn.b1, .bounce-btn.b2 { border-color: var(--amber); background: var(--amber-bg); color: #92400e; }
  .bounce-btn.b3 { border-color: var(--red); background: var(--red-bg); color: #991b1b; }

  /* ── Traffic light table ── */
  .tl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tl-table th { background: var(--teal); color: white; padding: 8px 12px; text-align: left; font-size: 12px; }
  .tl-table td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
  .tl-table tr:last-child td { border-bottom: none; }
  .tl-table tr:nth-child(even) { background: #f8fafc; }

  /* ── Badges ── */
  .badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; border: 1px solid; }
  .badge-green { background: var(--green-bg); color: #065f46; border-color: #6ee7b7; }
  .badge-red { background: var(--red-bg); color: #991b1b; border-color: #fca5a5; }
  .badge-amber { background: var(--amber-bg); color: #92400e; border-color: #fcd34d; }
  .badge-grey { background: var(--grey-bg); color: #374151; border-color: #d1d5db; }
  .badge-blue { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }

  /* ── Verdict ── */
  .verdict-box { border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .verdict-approved { background: var(--green-bg); border: 2px solid #6ee7b7; }
  .verdict-conditions { background: var(--amber-bg); border: 2px solid #fcd34d; }
  .verdict-deferred { background: #dbeafe; border: 2px solid #93c5fd; }
  .verdict-declined { background: var(--red-bg); border: 2px solid #fca5a5; }
  .verdict-label { font-size: 22px; font-weight: 900; }
  .v-approved .verdict-label { color: var(--green); }
  .v-conditions .verdict-label { color: var(--amber); }
  .v-deferred .verdict-label { color: #2563eb; }
  .v-declined .verdict-label { color: var(--red); }
  .verdict-meta { font-size: 11px; margin-top: 4px; color: #6b7280; }
  .conditions-list { margin-top: 10px; padding-left: 18px; }
  .conditions-list li { font-size: 13px; margin-bottom: 4px; }

  /* ── Flags ── */
  .flag-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; }
  .flag-red { background: var(--red-bg); border: 1px solid #fca5a5; }
  .flag-amber { background: var(--amber-bg); border: 1px solid #fcd34d; }
  .flag-green { background: var(--green-bg); border: 1px solid #6ee7b7; }
  .flag-src { font-size: 11px; font-weight: 700; color: white; border-radius: 3px; padding: 1px 6px; white-space: nowrap; }
  .src-tu { background: #0369a1; }
  .src-fin { background: var(--gold); }
  .src-bank { background: var(--teal); }
  .src-ccf { background: #7c3aed; }
  .src-deal { background: #374151; }
  .flag-text { font-size: 13px; }
  .flag-red .flag-text { color: #7f1d1d; }
  .flag-amber .flag-text { color: #78350f; }
  .flag-green .flag-text { color: #065f46; }

  /* ── Verdict selector ── */
  .verdict-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .vbtn { flex: 1; min-width: 120px; padding: 10px 8px; border-radius: 7px; font-weight: 700; font-size: 12px; cursor: pointer; border: 2px solid; font-family: inherit; }
  .vbtn-approved { border-color: #6ee7b7; background: var(--green-bg); color: #065f46; }
  .vbtn-approved.active { background: var(--green); color: white; }
  .vbtn-conditions { border-color: #fcd34d; background: var(--amber-bg); color: #92400e; }
  .vbtn-conditions.active { background: var(--amber); color: white; }
  .vbtn-deferred { border-color: #93c5fd; background: #dbeafe; color: #1e40af; }
  .vbtn-deferred.active { background: #2563eb; color: white; }
  .vbtn-declined { border-color: #fca5a5; background: var(--red-bg); color: #991b1b; }
  .vbtn-declined.active { background: var(--red); color: white; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 48px 24px; }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--light-blue); border-top-color: var(--teal); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading h2 { color: var(--teal); font-size: 18px; margin-bottom: 6px; }
  .loading p { color: #6b7280; font-size: 14px; }

  /* ── Alert boxes ── */
  .alert { border-radius: 7px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
  .alert-red { background: var(--red-bg); border: 1px solid #fca5a5; color: #991b1b; }
  .alert-amber { background: var(--amber-bg); border: 1px solid #fcd34d; color: #78350f; }
  .alert-green { background: var(--green-bg); border: 1px solid #6ee7b7; color: #065f46; }
  .alert-blue { background: #dbeafe; border: 1px solid #93c5fd; color: #1e40af; }

  /* ── API key modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; border-radius: 12px; padding: 28px; width: 440px; max-width: 95vw; }
  .modal h2 { color: var(--teal); font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: #6b7280; margin-bottom: 16px; }

  /* ── Tabs ── */
  .section-title { font-weight: 700; color: var(--teal); font-size: 14px; border-bottom: 2px solid var(--gold); padding-bottom: 6px; margin-bottom: 12px; }

  /* ── Synopsis ── */
  #synopsis-text { width: 100%; min-height: 80px; padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; resize: vertical; font-family: inherit; line-height: 1.7; }
  .char-count { font-size: 10px; color: #9ca3af; text-align: right; margin-top: 3px; }

  /* ── Print ── */
  @media print { .no-print { display: none !important; } body { background: white; } }
</style>
</head>
<body>

<!-- API Key Modal -->
<div id="api-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>Anthropic API Key</h2>
    <p>Your key is stored in sessionStorage only — never sent anywhere except directly to Anthropic's API.</p>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-...">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveApiKey()">Save & Continue</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header no-print">
  <div>
    <h1>CCF Unified Credit Engine</h1>
    <p>TransUnion · Financials · Bank Statements · Deal Context</p>
  </div>
  <button class="api-badge" onclick="showModal()">⚙ API Key</button>
</div>

<div class="container" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const S = {
  step: 'upload',
  apiKey: sessionStorage.getItem('ccf_unified_key') || '',
  files: { tu: [], finCur: [], finPri: [], manAccs: [], bank: [] },
  payout: '', rental: '', assetType: 'non-income', entity: '',
  bounceCount: 0, bounceSelected: false,
  exposure: { npv: 0, count: 0, clientName: '' },
  rsFile: null, rsData: [], rsSearch: '', rsResults: [],
  dealCtx: null, _dc: null,
  progress: '',
  tuResult: null, finResult: null, bankResult: null,
  synopsis: '', verdict: null, verdictNote: '',
  error: ''
};

// ═══════════════════════════════════════════════════════════════
// API KEY
// ═══════════════════════════════════════════════════════════════
function showModal() { document.getElementById('api-modal').style.display = 'flex'; document.getElementById('api-key-input').value = S.apiKey; }
function closeModal() { document.getElementById('api-modal').style.display = 'none'; }
function saveApiKey() { S.apiKey = document.getElementById('api-key-input').value.trim(); sessionStorage.setItem('ccf_unified_key', S.apiKey); closeModal(); render(); }

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const fmt = (n, d=0) => n == null || isNaN(n) ? 'N/A' : Number(n).toLocaleString('en-ZA', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtR = n => n == null ? '—' : 'R ' + fmt(n, 2);
const pct = (a,b) => (!a||!b||b===0) ? null : parseFloat(((a/b)*100).toFixed(1));
const rat = (a,b) => (!a||!b||b===0) ? null : parseFloat((a/b).toFixed(2));

async function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function callClaude(systemPrompt, userContent, maxTokens=4000) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': S.apiKey, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, system: systemPrompt, messages: [{ role: 'user', content: userContent }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.find(b => b.type === 'text')?.text || '';
}

async function parseJson(raw) {
  let clean = raw.replace(/```json|```/g, '').trim();
  try { return JSON.parse(clean); } catch {
    // repair
    const repaired = await callClaude('Complete this truncated JSON so it is valid. Output ONLY valid JSON, nothing else.', clean);
    return JSON.parse(repaired.replace(/```json|```/g, '').trim());
  }
}

// ═══════════════════════════════════════════════════════════════
// DEAL TIER
// ═══════════════════════════════════════════════════════════════
function getTier(payout) {
  if (!payout || isNaN(payout)) return null;
  if (payout <= 250000) return 1;
  if (payout <= 400000) return 2;
  return 3;
}
const TIER_INFO = {
  1: { label: '≤ R250k', desc: 'TransUnion required. Auto-approve if clean + property. Request bank statements if no property. Decline if adverse.' },
  2: { label: 'R250k–R400k', desc: 'TransUnion + bank statements required. Financials optional. Decline if TU adverse.' },
  3: { label: '> R400k', desc: 'TransUnion + financials required. Bank statements strongly preferred. Decline if TU adverse.' }
};

// ═══════════════════════════════════════════════════════════════
// EVALUATION FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function evalTU(tu) {
  if (!tu) return { available: false, flags: [], isClean: false, hasProperty: false, hardDecline: false, dirAged: false };
  const hasProperty = tu.c5_props > 0 || tu.c4_dir_property === 'all' || tu.c4_dir_property === 'one';
  const hasJudgments = tu.c3_judgments === '2' || tu.c3_judgments === '1';
  const hasDefaults = tu.c3_defaults === '2' || tu.c3_defaults === '1';
  const dirJ = tu.c4_judgments === '1' || tu.c4_judgments === '2';
  const dirD = tu.c4_defaults === '1';
  const ageLt2 = tu.c1_age < 2;
  const dirAged = tu.ko_dir_age !== null && tu.ko_dir_age >= 70 && tu.ko_dir_age <= 100;
  const hardDecline = ageLt2 || tu.c3_judgments === '2' || tu.c3_defaults === '2' || dirJ || dirD;
  const isClean = !hasJudgments && !hasDefaults && !dirJ && !dirD;
  const flags = [];
  if (hasJudgments) flags.push({ level:'red', text:`Business has judgment(s) on record` });
  if (hasDefaults) flags.push({ level:'red', text:`Business has default(s) on record` });
  if (dirJ) flags.push({ level:'red', text:'Director(s) have civil judgments' });
  if (dirD) flags.push({ level:'red', text:'Director(s) have personal defaults' });
  if (ageLt2) flags.push({ level:'red', text:'Business less than 2 years old — hard decline' });
  else if (tu.c1_age < 3) flags.push({ level:'amber', text:'Business under 3 years — requires mitigants' });
  if (dirAged) flags.push({ level:'amber', text:`Director aged ${tu.ko_dir_age} — succession plan required` });
  if (!hasProperty) flags.push({ level:'amber', text:'No property ownership detected (business or director)' });
  return { available: true, hasProperty, isClean, hardDecline, dirAged, flags, score: tu.c2_commercial, age: tu.c1_age };
}

function evalBank(bank, rental) {
  if (!bank) return { available: false, flags: [], isStrong: false, isMarginal: false, hardDecline: false, rdCount: 0, coverage: null, conduct: null, avgMonthly: 0, dti: null };
  const rdCount = bank.rd_count || 0;
  const conduct = bank.overall_conduct || bank.conduct_rating;
  const avgMonthly = bank.avg_monthly_income_excl_transfers || bank.avg_monthly_income || 0;
  const coverage = rental && avgMonthly > 0 ? parseFloat((avgMonthly / rental).toFixed(2)) : null;
  const dti = bank.debt_to_income_ratio;
  const hasRDs = rdCount > 0;
  const flags = [];
  if (hasRDs) flags.push({ level:'red', text:`${rdCount} returned debit(s) — hard decline flag` });
  if (conduct === 'POOR') flags.push({ level:'red', text:'Bank account conduct rated POOR' });
  if (conduct === 'CONCERNING') flags.push({ level:'amber', text:'Bank account conduct rated CONCERNING' });
  if (coverage !== null && coverage < 1.5) flags.push({ level: coverage < 1.0 ? 'red' : 'amber', text:`Bank income coverage ${coverage}x — below ${coverage < 1.0 ? 'minimum' : 'guideline'} 1.5x` });
  if (dti !== null && dti > 0.6) flags.push({ level:'red', text:`Debt-to-income ratio ${(dti*100).toFixed(1)}% — high debt burden` });
  const isStrong = !hasRDs && (conduct === 'GOOD' || conduct === 'SATISFACTORY') && (coverage === null || coverage >= 1.5);
  const isMarginal = !hasRDs && conduct === 'CONCERNING';
  const hardDecline = hasRDs || conduct === 'POOR';
  return { available: true, hasRDs, rdCount, conduct, coverage, avgMonthly, dti, isStrong, isMarginal, hardDecline, flags };
}

function evalFin(fin, rental, payout, assetType) {
  if (!fin || !fin.current) return { available: false, flags: [], isStrong: false, isMarginal: false, hardDecline: false, ebitdaCoverage: null, equity: null, dealPct: null, eqMeets: null, eqThreshold: assetType === 'income' ? 30 : 10 };
  const c = fin.current;
  const annualRental = rental * 12;
  const ebitdaCoverage = c.ebitda && annualRental ? parseFloat((c.ebitda / annualRental).toFixed(2)) : null;
  const equity = c.total_equity;
  const eqThreshold = assetType === 'income' ? 30 : 10;
  const dealPct = equity && payout ? parseFloat(((payout / equity) * 100).toFixed(1)) : null;
  const negativeEquity = equity !== null && equity < 0;
  const eqMeets = dealPct !== null ? dealPct <= eqThreshold : null;
  const flags = [];
  if (negativeEquity) flags.push({ level:'red', text:`Negative equity (${fmtR(equity)}) — insolvent entity` });
  if (ebitdaCoverage !== null && ebitdaCoverage < 1.0) flags.push({ level: ebitdaCoverage < 0.8 ? 'red' : 'amber', text:`EBITDA coverage ${ebitdaCoverage}x — ${ebitdaCoverage < 0.8 ? 'insufficient' : 'marginal'}` });
  if (!eqMeets && dealPct !== null) flags.push({ level:'amber', text:`Deal is ${dealPct}% of equity — exceeds ≤${eqThreshold}% guideline` });
  if (fin.assurance_level === 'Unaudited') flags.push({ level:'amber', text:'Financials are unaudited — reduced reliability' });
  if ((fin.accounting_errors||[]).length > 0) flags.push({ level:'red', text:`${fin.accounting_errors.length} accounting error(s) detected in financials` });
  const isStrong = !negativeEquity && ebitdaCoverage !== null && ebitdaCoverage >= 1.5 && eqMeets !== false;
  const isMarginal = !negativeEquity && ebitdaCoverage !== null && ebitdaCoverage >= 0.8 && ebitdaCoverage < 1.5;
  return { available: true, ebitdaCoverage, equity, dealPct, eqThreshold, eqMeets, negativeEquity, isStrong, isMarginal, hardDecline: negativeEquity, flags, assurance: fin.assurance_level };
}

function evalExposure(bounceCount, bounceSelected, exposure) {
  if (!bounceSelected) return { available: false, flags: [] };
  const isExisting = exposure.npv > 0;
  const cleanConduct = bounceCount === 0;
  const flags = [];
  if (bounceCount >= 3) flags.push({ level:'red', text:`${bounceCount}+ bounces on existing CCF account — serious conduct concern` });
  else if (bounceCount > 0) flags.push({ level:'amber', text:`${bounceCount} bounce(s) on existing CCF account — conditions apply` });
  if (isExisting && cleanConduct) flags.push({ level:'green', text:`Existing CCF client — ${fmtR(exposure.npv)} exposure with zero bounces (strong mitigant)` });
  return { available: true, isExisting, cleanConduct, bounceCount, flags, npv: exposure.npv };
}

function evalDeal(deal) {
  if (!deal) return { available: false, flags: [], score: 0, dealStrength: 'Neutral', dealColor: 'grey', summary: [] };
  const flags = [], summary = [];
  let score = 0;
  const gradeMap = { 'A':{s:15,c:'green',m:'Risk Grade A supplier — strongest supplier profile'}, 'B+':{s:10,c:'green',m:'Risk Grade B+ supplier — strong supplier profile'}, 'B':{s:5,c:'green',m:'Risk Grade B supplier — acceptable supplier profile'}, 'B-':{s:0,c:'amber',m:'Risk Grade B- supplier — monitor supplier health'}, 'C':{s:-8,c:'amber',m:'Risk Grade C supplier — elevated risk; conditions apply'}, 'D':{s:-15,c:'red',m:'Risk Grade D supplier — high risk; likely decline'} };
  const grade = (deal.riskGrade||'').toUpperCase().trim();
  const gi = gradeMap[grade];
  if (gi) { score += gi.s; flags.push({ level:gi.c, text:gi.m }); summary.push(`Grade ${grade}`); }
  const periodMonths = parseInt((deal.period||'').replace(/[^0-9]/g,'')) || null;
  const isSolar = /solar|pv|photovoltaic|inverter|battery|panel/i.test(deal.equipment||'');
  const maxPeriod = isSolar ? 120 : 60;
  if (periodMonths !== null) {
    if (periodMonths <= 36) { score += 8; flags.push({ level:'green', text:`Period ${periodMonths}m — short term reduces exposure` }); }
    else if (periodMonths <= 48) { score += 3; }
    else if (periodMonths > maxPeriod) { score -= 5; flags.push({ level:'amber', text:`Period ${periodMonths}m exceeds standard max of ${maxPeriod}m` }); }
    summary.push(`${periodMonths}m${isSolar?' (solar)':''}`);
  }
  const hasRecourse = /recourse/i.test(deal.approvalTerms||'');
  if (hasRecourse) { score += 12; flags.push({ level:'green', text:'Supplier recourse confirmed — significant risk mitigant' }); summary.push('Recourse'); }
  if (deal.equipment) summary.push(deal.equipment.substring(0, 40));
  const dealStrength = score >= 15 ? 'Strong' : score >= 5 ? 'Good' : score >= -4 ? 'Neutral' : score >= -10 ? 'Marginal' : 'Weak';
  const dealColor = score >= 5 ? 'green' : score >= -4 ? 'grey' : score >= -10 ? 'amber' : 'red';
  return { available: true, flags, score, dealStrength, dealColor, summary, hasRecourse, periodMonths, grade, isSolar };
}

// VERDICT ENGINE
// ═══════════════════════════════════════════════════════════════
function deriveVerdict(tier, tuEval, bankEval, finEval, expEval, dealEval) {
  const conditions = [], declineReasons = [];
  const expClean = expEval?.available && expEval.isExisting && expEval.cleanConduct;
  const expBouncy = expEval?.available && expEval.bounceCount > 0;
  const dealRecourse = dealEval?.available && dealEval.hasRecourse;
  const dealGradeD = dealEval?.available && dealEval.grade === 'D';
  const dealGradeStrong = dealEval?.available && ['A','B+','B'].includes(dealEval.grade);
  const dealShort = dealEval?.available && dealEval.periodMonths !== null && dealEval.periodMonths <= 36;

  // Hard declines
  if (tuEval.hardDecline) { declineReasons.push(...tuEval.flags.filter(f=>f.level==='red').map(f=>f.text)); return { verdict:'declined', declineReasons, conditions, confidence:'HIGH' }; }
  if (tuEval.dirAged) return { verdict:'deferred', declineReasons, conditions:['Director aged 70+ — succession plan required'], confidence:'HIGH' };
  if (bankEval.available && bankEval.hardDecline) { declineReasons.push(...bankEval.flags.filter(f=>f.level==='red').map(f=>f.text)); return { verdict:'declined', declineReasons, conditions, confidence:'HIGH' }; }
  if (finEval.available && finEval.hardDecline) { declineReasons.push(...finEval.flags.filter(f=>f.level==='red').map(f=>f.text)); return { verdict:'declined', declineReasons, conditions, confidence:'HIGH' }; }
  if (expEval?.available && expEval.bounceCount >= 3) { declineReasons.push(`${expEval.bounceCount} bounces on existing CCF account`); return { verdict:'declined', declineReasons, conditions, confidence:'HIGH' }; }
  if (dealGradeD) conditions.push('Risk Grade D supplier — escalate to credit committee');
  if (expBouncy && expEval.bounceCount < 3) conditions.push(`${expEval.bounceCount} bounce(s) on existing CCF account — credit committee sign-off required`);

  if (tier === 1) {
    if (tuEval.isClean && tuEval.hasProperty) {
      if (expBouncy) { conditions.push(`${expEval.bounceCount} bounce(s) — approve with debit order monitoring`); return { verdict:'conditions', declineReasons, conditions, confidence:'MEDIUM' }; }
      return { verdict:'approved', declineReasons, conditions, confidence:'HIGH' };
    }
    if (tuEval.isClean && !tuEval.hasProperty) {
      if (dealRecourse) return { verdict:'approved', declineReasons, conditions:['No property on TU — approved on strength of supplier recourse'], confidence:'HIGH' };
      if (dealShort && dealGradeStrong) return { verdict:'approved', declineReasons, conditions:['No property on TU — approved on short period and strong supplier grade'], confidence:'MEDIUM' };
      if (expClean) return { verdict:'approved', declineReasons, conditions:['No property on TU — approved on clean existing CCF conduct (zero bounces)'], confidence:'HIGH' };
      conditions.push('No property detected — bank statements required to support approval');
      if (bankEval.available) {
        if (bankEval.isStrong) return { verdict:'approved', declineReasons, conditions:['No property — approved on clean TU and satisfactory bank conduct'], confidence:'MEDIUM' };
        if (bankEval.isMarginal) { conditions.push('Bank conduct CONCERNING — escalate to senior credit'); return { verdict:'conditions', declineReasons, conditions, confidence:'MEDIUM' }; }
      }
      return { verdict:'deferred', declineReasons, conditions, confidence:'MEDIUM' };
    }
    conditions.push('Minor adverse on TransUnion — escalate to senior credit');
    return { verdict:'conditions', declineReasons, conditions, confidence:'MEDIUM' };
  }

  if (tier === 2) {
    if (!bankEval.available) return { verdict:'deferred', declineReasons, conditions:['Bank statements required for Tier 2 deals'], confidence:'LOW' };
    if (!tuEval.isClean) conditions.push('Minor adverse on TransUnion — escalate to senior credit');
    if (!tuEval.hasProperty) conditions.push(expClean ? 'No property — mitigated by clean CCF conduct; suretyship recommended' : 'No property — obtain additional security or suretyship');
    if (bankEval.isMarginal) conditions.push('Bank conduct CONCERNING — obtain updated statements before drawdown');
    if (bankEval.coverage !== null && bankEval.coverage < 1.5 && bankEval.coverage >= 1.0) conditions.push(`Bank coverage marginal at ${bankEval.coverage}x — monitor post-approval`);
    if (conditions.length === 0) return { verdict:'approved', declineReasons, conditions, confidence:'HIGH' };
    return { verdict:'conditions', declineReasons, conditions, confidence:'MEDIUM' };
  }

  if (tier === 3) {
    if (!finEval.available) return { verdict:'deferred', declineReasons, conditions:['Financials required for deals above R400k'], confidence:'LOW' };
    if (!tuEval.isClean) conditions.push('Minor adverse on TransUnion — escalate to credit committee');
    if (!tuEval.hasProperty) conditions.push(expClean ? 'No property — mitigated by clean CCF conduct; suretyship recommended' : 'No property — obtain additional security or suretyship');
    if (finEval.ebitdaCoverage !== null && finEval.ebitdaCoverage < 1.0) { declineReasons.push(`EBITDA coverage insufficient at ${finEval.ebitdaCoverage}x`); return { verdict:'declined', declineReasons, conditions, confidence:'HIGH' }; }
    if (finEval.isMarginal) conditions.push(`EBITDA coverage marginal at ${finEval.ebitdaCoverage}x — ${expClean ? 'mitigated by clean CCF conduct; ' : ''}obtain quarterly management accounts`);
    if (!finEval.eqMeets && finEval.dealPct !== null) conditions.push(`Deal ${finEval.dealPct}% of equity exceeds ≤${finEval.eqThreshold}% guideline — credit committee sign-off`);
    if (finEval.assurance === 'Unaudited' || finEval.assurance === 'Compiled') conditions.push('Financials unaudited — obtain audited statements or additional security');
    if (!bankEval.available) conditions.push('Bank statements not provided — obtain at next review');
    else { if (bankEval.isMarginal) conditions.push('Bank conduct CONCERNING — updated statements required'); if (bankEval.coverage !== null && bankEval.coverage < 1.5 && bankEval.coverage >= 1.0) conditions.push(`Bank coverage ${bankEval.coverage}x marginal — monitor`); }
    if (conditions.length === 0) return { verdict:'approved', declineReasons, conditions, confidence:'HIGH' };
    return { verdict:'conditions', declineReasons, conditions, confidence:'MEDIUM' };
  }
  return { verdict:'deferred', declineReasons, conditions:['Check payout value'], confidence:'LOW' };
}

// RUN ANALYSIS
// ═══════════════════════════════════════════════════════════════
async function runAnalysis() {
  if (!S.apiKey) { showModal(); return; }
  if (S.files.tu.length === 0) { S.error = 'Please upload a TransUnion CV4B report.'; render(); return; }
  const payout = parseFloat(S.payout);
  const rental = parseFloat(S.rental);
  if (!payout || payout <= 0) { S.error = 'Please enter a valid payout / equipment value.'; render(); return; }
  if (!rental || rental <= 0) { S.error = 'Please enter a valid monthly rental amount.'; render(); return; }
  const tier = getTier(payout);
  if (tier === 2 && S.files.bank.length === 0) { S.error = 'Bank statements required for Tier 2 deals (R250k–R400k).'; render(); return; }
  if (tier === 3 && S.files.finCur.length === 0) { S.error = 'Financials required for Tier 3 deals (above R400k).'; render(); return; }

      S.error = ''; S.step = 'loading';
    S.rsData = []; S.rsFile = null; S.rsSearch = ''; S.rsResults = [];
    render();

  try {
    // TU
    setProgress('Parsing TransUnion report...');
    const tuB64 = await toB64(S.files.tu[0]);
    const tuRaw = await callClaude(TU_PROMPT, [{ type:'document', source:{ type:'base64', media_type:'application/pdf', data:tuB64 } }, { type:'text', text:'Extract all fields from this TransUnion CV4B report.' }]);
    S.tuResult = await parseJson(tuRaw);

    // Financials
    if (S.files.finCur.length > 0) {
      setProgress('Analysing financial statements...');
      const finContent = [];
      for (const f of [...S.files.finCur, ...S.files.finPri]) { finContent.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data: await toB64(f) } }); }
      for (const f of S.files.manAccs) { finContent.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data: await toB64(f) } }); }
      finContent.push({ type:'text', text:`Extract financial data. Current year files: ${S.files.finCur.length}. Prior year files: ${S.files.finPri.length}. Management accounts: ${S.files.manAccs.length}.` });
      const finRaw = await callClaude(FIN_PROMPT, finContent, 5000);
      S.finResult = await parseJson(finRaw);
    }

    // Bank
    if (S.files.bank.length > 0) {
      setProgress('Analysing bank statements...');
      const bankContent = [];
      for (const f of S.files.bank) { bankContent.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data: await toB64(f) } }); }
      bankContent.push({ type:'text', text:`Analyse these ${S.files.bank.length} bank statement PDF(s). Apply RD classification rules strictly.` });
      const bankRaw = await callClaude(BANK_PROMPT, bankContent, 5000);
      S.bankResult = await parseJson(bankRaw);
    }

    // Pre-fill synopsis
    const tuEv = evalTU(S.tuResult), bankEv = evalBank(S.bankResult, rental), finEv = evalFin(S.finResult, rental, payout, S.assetType);
    const { verdict } = deriveVerdict(tier, tuEv, bankEv, finEv, evalExposure(S.bounceCount, S.bounceSelected, S.exposure), evalDeal(S.dealCtx));
    setProgress('Generating synopsis...');
    const synCtx = buildSynopsisContext(tuEv, bankEv, finEv, verdict, payout, rental);
    S.synopsis = await callClaude(SYNOPSIS_PROMPT, synCtx, 600);

    S.step = 'review';
  } catch (ex) {
    S.error = 'Analysis failed: ' + ex.message;
    S.step = 'upload';
  }
  render();
}

function setProgress(msg) { S.progress = msg; render(); }

function buildSynopsisContext(tuEv, bankEv, finEv, verdict, payout, rental) {
  const fin = S.finResult;
  const bank = S.bankResult;
  const tier = getTier(parseFloat(S.payout));
  return `Entity: ${S.tuResult?.entity || S.entity || 'Unknown'}
Trading age: ${S.tuResult?.c1_age ?? '—'} years | TU Score: ${S.tuResult?.c2_commercial ?? '—'}
Deal: Tier ${tier} | Payout R${fmt(parseFloat(S.payout))} | Rental R${fmt(parseFloat(S.rental))}/month | Asset: ${S.assetType === 'income' ? 'Income-Generating' : 'Non-Income-Generating'}
TransUnion: Property ${tuEv.hasProperty ? 'Yes' : 'No'} | Status: ${tuEv.isClean ? 'Clean' : 'Adverse noted'}
${finEv.available ? `Financials (${fin?.assurance_level}): Revenue ${fmtR(fin?.current?.revenue)} | EBITDA ${fmtR(fin?.current?.ebitda)} | Coverage ${finEv.ebitdaCoverage ?? 'N/A'}x | Equity ${fmtR(finEv.equity)} | Deal ${finEv.dealPct ?? 'N/A'}% of equity` : 'Financials: Not provided'}
${bankEv.available ? `Bank: Conduct ${bankEv.conduct} | RDs ${bankEv.rdCount} | Avg income ${fmtR(bankEv.avgMonthly)}/month | Coverage ${bankEv.coverage ?? 'N/A'}x | DTI ${bankEv.dti != null ? (bankEv.dti*100).toFixed(1)+'%' : 'N/A'} | OD limit ${fmtR(bank?.overdraft_limit)}` : 'Bank: Not provided'}
${S.bounceSelected && S.exposure.npv > 0 ? `CCF existing: ${fmtR(S.exposure.npv)} | Bounces: ${S.bounceCount}` : 'CCF: New client or not checked'}
${S.dealCtx ? `Deal: Grade ${S.dealCtx.riskGrade} | Period ${S.dealCtx.period} | Recourse: ${/recourse/i.test(S.dealCtx.approvalTerms||'') ? 'Yes' : 'No'} | Equipment: ${S.dealCtx.equipment}` : ''}
Verdict: ${verdict.toUpperCase()}`;
}

function handleFiles(key, files) {
  const arr = Array.from(files);
  if (key === 'tu') S.files.tu = arr.slice(0,1);
  else S.files[key] = [...(S.files[key]||[]), ...arr];
  render();
}
function removeFile(key, idx) { S.files[key].splice(idx, 1); render(); }

function uploadZone(key, label, sublabel, multiple=false) {
  const files = S.files[key] || [];
  const id = `uz-${key}`;
  return `<div>
    <label>${label}</label>
    ${sublabel ? `<div style="font-size:11px;color:#6b7280;margin-bottom:6px">${sublabel}</div>` : ''}
    <div class="upload-zone ${files.length>0?'loaded':''}" onclick="document.getElementById('${id}').click()">
      <span>${files.length>0 ? `✓ ${files.length} file${files.length>1?'s':''} selected` : 'Click to upload PDF'}</span>
    </div>
    <input type="file" id="${id}" accept=".pdf" ${multiple?'multiple':''} style="display:none" onchange="handleFiles('${key}',this.files)">
    <div class="file-list">${files.map((f,i)=>`<div class="file-item"><span>📎 ${f.name}</span><button class="file-remove" onclick="removeFile('${key}',${i})">✕</button></div>`).join('')}</div>
  </div>`;
}

  <!-- Existing Exposure -->
  <div class="card">
    <div class="card-header"><h2>CCF Existing Exposure</h2><span style="font-size:11px;color:#6b7280">All tiers — optional but recommended</span></div>
    <div class="card-body">
      <p style="font-size:12px;color:#6b7280;margin-bottom:12px">Upload your Rental Suite Excel export to check existing exposure. Zero bounces on an existing account is a strong mitigant — can offset missing property on Tier 1.</p>

      ${!S.rsData || S.rsData.length === 0 ? `
        <!-- Step 1: Upload Rental Suite Excel -->
        <div class="upload-zone ${S.rsFile?'loaded':''}" onclick="document.getElementById('rs-upload').click()" style="margin-bottom:8px">
          <span>${S.rsFile ? `⏳ Parsing ${S.rsFile.name}...` : '📊 Upload Rental Suite Excel export (.xlsx / .xls)'}</span>
        </div>
        <input type="file" id="rs-upload" accept=".xlsx,.xls" style="display:none" onchange="handleRentalSuiteUpload(this.files[0])">
        <div style="font-size:11px;color:#9ca3af;text-align:right;margin-top:4px">
          <a href="#" onclick="S.bounceSelected=true;S.exposure={npv:0,count:0,clientName:'New client'};render();return false" style="color:#9ca3af">Skip — new client, no existing exposure</a>
        </div>
      ` : !S.bounceSelected ? `
        <!-- Step 2: Search loaded data -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:12px;color:#065f46;background:#ecfdf5;border:1px solid #86efac;border-radius:5px;padding:4px 10px">
            ✓ ${S.rsData.length} clients loaded from ${S.rsFile?.name}
          </div>
          <button class="btn btn-outline btn-sm" onclick="S.rsData=[];S.rsFile=null;S.rsSearch='';S.rsResults=[];render()">Change file</button>
        </div>
        <input type="text" value="${S.rsSearch||''}" oninput="S.rsSearch=this.value;searchRentalSuite(this.value);render()" placeholder="Type client name to search..." style="margin-bottom:8px">
        ${(S.rsResults||[]).length > 0 ? `
          <div style="background:white;border:1px solid #c4b5fd;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(124,58,237,0.08);margin-bottom:8px">
            ${S.rsResults.map((r,i) => `
              <div onclick="selectRsClient(${i})" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:${i<S.rsResults.length-1?'1px solid #ede9fe':'none'};cursor:pointer"
                onmouseover="this.style.background='#f5f3ff'" onmouseout="this.style.background='white'">
                <div>
                  <span style="font-weight:600;color:#1f2937;font-size:13px">${r.name}</span>
                  ${r.score > 0 ? '<span style="margin-left:8px;font-size:10px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:3px;padding:1px 6px;font-weight:600">close match</span>' : '<span style="margin-left:8px;font-size:10px;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;border-radius:3px;padding:1px 6px;font-weight:600">exact</span>'}
                </div>
                <div style="text-align:right">
                  <div style="color:#5b21b6;font-weight:700;font-size:13px">${fmtR(r.npv)}</div>
                  ${r.count > 1 ? `<div style="font-size:10px;color:#9ca3af">${r.count} deals</div>` : ''}
                </div>
              </div>`).join('')}
          </div>
        ` : S.rsSearch && S.rsSearch.length >= 2 ? `
          <div style="font-size:12px;color:#065f46;background:#ecfdf5;border:1px solid #86efac;border-radius:6px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span>✓ No existing exposure found for "${S.rsSearch}".</span>
            <button class="btn btn-outline btn-sm" onclick="S.bounceSelected=true;S.exposure={npv:0,count:0,clientName:S.rsSearch};if(!S.entity)S.entity=S.rsSearch;render()">Confirm new client</button>
          </div>
        ` : ''}
      ` : `
        <!-- Step 3: Selected — show exposure + bounce input -->
        <div style="background:white;border:1px solid #c4b5fd;border-radius:8px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:#7c3aed;font-weight:600;margin-bottom:2px">RENTAL SUITE EXPOSURE</div>
              <div style="font-weight:700;font-size:15px;color:#1f2937">${S.exposure.clientName}</div>
              <div style="font-size:12px;color:#5b21b6;margin-top:2px">
                ${S.exposure.npv > 0 ? `${fmtR(S.exposure.npv)} existing exposure · ${S.exposure.count} deal${S.exposure.count!==1?'s':''} on book` : 'New client — no existing CCF exposure'}
              </div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="S.bounceSelected=false;S.rsSearch='';S.rsResults=[];render()">Change</button>
          </div>
          <div style="border-top:1px solid #ede9fe;padding-top:12px">
            <label style="color:#5b21b6;margin-bottom:8px">Bounces / Returned Debits on Existing CCF Account</label>
            <div style="font-size:11px;color:#6b7280;margin-bottom:8px">Enter the number of bounces recorded against this client in CCF's book:</div>
            <div class="bounce-row">
              ${[0,1,2,3,'4+'].map(n => {
                const v = n==='4+' ? 4 : n;
                const sel = n==='4+' ? S.bounceCount >= 4 : S.bounceCount === v;
                const col = v===0 ? 'var(--green)' : v<=2 ? 'var(--amber)' : 'var(--red)';
                const bg = v===0 ? 'var(--green-bg)' : v<=2 ? 'var(--amber-bg)' : 'var(--red-bg)';
                return `<button class="bounce-btn" onclick="S.bounceCount=${v};render()" style="border-color:${sel?col:'#d1d5db'};background:${sel?bg:'white'};color:${sel?(v===0?'#065f46':v<=2?'#92400e':'#991b1b'):'#374151'}">${n}</button>`;
              }).join('')}
            </div>
            <div style="margin-top:8px;font-size:12px;font-weight:600;color:${S.bounceCount===0?'var(--green)':S.bounceCount<=2?'var(--amber)':'var(--red)'}">
              ${S.bounceCount===0 ? '✓ Clean conduct — zero bounces. Qualifies as strong mitigant (can offset missing property on Tier 1).' : S.bounceCount<=2 ? `⚠ ${S.bounceCount} bounce(s) — approval conditions will apply.` : `✕ ${S.bounceCount}+ bounces — serious conduct concern; likely decline.`}
            </div>
          </div>
        </div>
      `}
    </div>
  </div>

  <!-- Deal Context via Monday API -->
  <div class="card">
    <div class="card-header"><h2>Monday Deal Context</h2><span style="font-size:11px;color:#6b7280;background:#dbeafe;border-radius:4px;padding:2px 8px;font-weight:600">Optional — All Tiers</span></div>
    <div class="card-body">
      <p style="font-size:12px;color:#6b7280;margin-bottom:12px">Search Applications 2026 board to pull supplier risk grade, period, recourse, and equipment — these feed directly into the credit decision.</p>

      ${!S.dealCtx ? `
        <!-- Token -->
        <div class="form-group">
          <input type="password" value="${S.mondayToken||''}" placeholder="Monday.com API token" oninput="S.mondayToken=this.value;try{sessionStorage.setItem('ccf_monday_token',this.value)}catch(e){}">
        </div>

        <!-- URL / Item ID fetch -->
        <div style="display:flex;gap:8px;margin-bottom:6px">
          <input type="text" id="monday-id-input" placeholder="Paste Monday deal URL or item ID..." style="flex:1" oninput="S._mondayIdInput=this.value" onkeydown="if(event.key==='Enter')fetchMondayDeal()">
          <button class="btn btn-primary" onclick="fetchMondayDeal()" style="white-space:nowrap">Fetch →</button>
        </div>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:12px">e.g. https://customcapital.monday.com/boards/18393867301/pulses/12333160286</div>

        ${S.dealFetchError ? `<div class="alert alert-red" style="margin-bottom:10px">${S.dealFetchError}</div>` : ''}
        ${S.dealSearching ? '<div style="font-size:12px;color:var(--teal);margin-bottom:10px">⏳ Fetching from Monday...</div>' : ''}

        <!-- Name search fallback -->
        <div style="border-top:1px solid #e2e8f0;padding-top:12px;margin-top:4px">
          <div style="font-size:11px;color:#6b7280;margin-bottom:6px;font-weight:600">Or search by client name:</div>
          <input type="text" value="${S.dealSearch||''}" placeholder="Or search by client name..." oninput="S.dealSearch=this.value;searchMondayDeals(this.value)">
        </div>

        ${(S.dealResults||[]).length > 0 ? `
          <div style="background:white;border:1px solid #93c5fd;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(3,105,161,0.08);margin-top:8px">
            ${S.dealResults.map((d,i) => {
              const gradeCol = {A:'#059669','B+':'#059669',B:'#0369a1','B-':'#d97706',C:'#d97706',D:'#dc2626'}[d.riskGrade] || '#6b7280';
              const hasRecourse = /recourse/i.test(d.approvalTerms||'');
              return `<div onclick="selectDeal(${i})" style="padding:10px 14px;border-bottom:${i<S.dealResults.length-1?'1px solid #dbeafe':'none'};cursor:pointer" onmouseover="this.style.background='#f0f9ff'" onmouseout="this.style.background='white'">
                <div style="display:flex;justify-content:space-between;align-items:flex-start">
                  <div>
                    <span style="font-weight:700;color:#1f2937;font-size:13px">${d.client}</span>
                    <span style="margin-left:8px;font-size:11px;color:#6b7280">${d.itemName||''}</span>
                  </div>
                  <div style="display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
                    ${d.riskGrade?`<span style="font-size:11px;font-weight:700;color:white;background:${gradeCol};border-radius:3px;padding:1px 7px">Grade ${d.riskGrade}</span>`:''}
                    ${hasRecourse?'<span style="font-size:10px;color:#059669;font-weight:700;background:#d1fae5;border:1px solid #6ee7b7;border-radius:3px;padding:1px 6px">🛡 Recourse</span>':''}
                    ${d.dealStatus?`<span style="font-size:10px;color:#6b7280;background:#f1f5f9;border-radius:3px;padding:1px 6px">${d.dealStatus}</span>`:''}
                  </div>
                </div>
                <div style="margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#6b7280">
                  ${d.equipment?`<span>🔧 ${d.equipment.substring(0,45)}${d.equipment.length>45?'...':''}</span>`:''}
                  ${d.period?`<span>⏱ ${d.period}</span>`:''}
                  ${d.rental?`<span>💰 ${d.rental}</span>`:''}
                </div>
              </div>`;
            }).join('')}
          </div>
        ` : S.dealSearch && S.dealSearch.length >= 2 && !S.dealSearching && S.mondayToken ? `
          <div style="font-size:12px;color:#6b7280;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;margin-top:8px">No deals found for "${S.dealSearch}".</div>
        ` : ''}

        <div style="margin-top:10px;font-size:11px;text-align:right">
          <a href="#" onclick="S.dealCtx={};S.dealSearch='';S.dealResults=[];render();return false" style="color:#9ca3af;text-decoration:underline">Skip — no Monday deal linked</a>
        </div>
      ` : `
        <!-- Deal selected -->
        <div style="background:white;border:1px solid #93c5fd;border-radius:8px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-size:11px;color:#0369a1;font-weight:600;margin-bottom:2px">MONDAY DEAL CONTEXT</div>
              <div style="font-weight:700;font-size:14px;color:#1f2937">${S.dealCtx.client||'Deal loaded'}</div>
              <div style="font-size:12px;color:#6b7280">${S.dealCtx.itemName||''}</div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="S.dealCtx=null;S.dealSearch='';S.dealResults=[];S.dealFetchError='';render()">Change</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">
            ${[
              ['Supplier Risk Grade', S.dealCtx.riskGrade, true],
              ['Period', S.dealCtx.period, false],
              ['Rental on Deal', S.dealCtx.rental, false],
              ['Equipment', S.dealCtx.equipment, false],
              ['Recourse', /recourse/i.test(S.dealCtx.approvalTerms||'')?'✓ Confirmed':'Not confirmed', false],
              ['Evidence Tier', S.dealCtx.evidenceTier, false],
              ['Financial Strength', S.dealCtx.financialStrength, false],
              ['BDO', S.dealCtx.bdo, false],
            ].filter(f=>f[1]).map(([l,v,hi])=>{
              const gradeColors={A:'#d1fae5','B+':'#d1fae5',B:'#dbeafe','B-':'#fef3c7',C:'#fef3c7',D:'#fee2e2'};
              const bg = hi ? (gradeColors[(v||'').toUpperCase().trim()]||'#f8fafc') : '#f8fafc';
              return `<div style="background:${bg};border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px">
                <div style="font-size:10px;color:#6b7280;font-weight:600">${l}</div>
                <div style="font-size:13px;font-weight:${hi?800:600};color:#1f2937">${v}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `}
    </div>
  </div>

  ${S.error ? `<div class="alert alert-red">${S.error}</div>` : ''}
  ${!S.apiKey ? `<div class="alert alert-amber">⚠ API key not set — <a href="#" onclick="showModal();return false">click here to add it</a> before running analysis.</div>` : ''}

  <button class="btn btn-primary btn-full" style="margin-top:4px;padding:14px" onclick="runAnalysis()">Run Unified Credit Assessment →</button>`;
}

function renderReview() {
  const payout = parseFloat(S.payout), rental = parseFloat(S.rental);
  const tier = getTier(payout);
  const assetLabel = S.assetType === 'income' ? 'Income-Generating' : 'Non-Income-Generating';
  const entity = S.entity || S.tuResult?.entity || 'Applicant';
  const tuEv = evalTU(S.tuResult);
  const bankEv = evalBank(S.bankResult, rental);
  const finEv = evalFin(S.finResult, rental, payout, S.assetType);
  const expEv = evalExposure(S.bounceCount, S.bounceSelected, S.exposure);
  const dealEv = evalDeal(S.dealCtx);
  const { verdict: derived, declineReasons, conditions } = deriveVerdict(tier, tuEv, bankEv, finEv, expEv, dealEv);
  const activeVerdict = S.verdict || derived;
  const vInfo = { approved:{label:'✓ Approved',cls:'verdict-approved',lc:'#059669'}, conditions:{label:'⚠ Approve with Conditions',cls:'verdict-conditions',lc:'#d97706'}, deferred:{label:'⟳ Deferred',cls:'verdict-deferred',lc:'#2563eb'}, declined:{label:'✕ Declined',cls:'verdict-declined',lc:'#dc2626'} };
  const vi = vInfo[activeVerdict] || vInfo.deferred;

  const tuStatus = tuEv.hardDecline ? 'red' : !tuEv.isClean ? 'amber' : 'green';
  const bankStatus = !bankEv.available ? 'grey' : bankEv.hardDecline ? 'red' : bankEv.isStrong ? 'green' : 'amber';
  const finStatus = !finEv.available ? 'grey' : finEv.hardDecline ? 'red' : finEv.isStrong ? 'green' : finEv.isMarginal ? 'amber' : 'green';
  const expStatus = !expEv.available ? 'grey' : expEv.bounceCount >= 3 ? 'red' : expEv.bounceCount > 0 ? 'amber' : expEv.isExisting ? 'green' : 'grey';
  const dealStatus = !dealEv.available ? 'grey' : { Strong:'green', Good:'green', Neutral:'grey', Marginal:'amber', Weak:'red' }[dealEv.dealStrength] || 'grey';

  const allFlags = [
    ...tuEv.flags.map(f=>({...f,src:'TU'})),
    ...finEv.flags.map(f=>({...f,src:'Fin'})),
    ...bankEv.flags.map(f=>({...f,src:'Bank'})),
    ...(expEv.flags||[]).map(f=>({...f,src:'CCF'})),
    ...(dealEv.flags||[]).map(f=>({...f,src:'Deal'}))
  ];

  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px" class="no-print">
    <div>
      <h2 style="color:var(--teal);font-size:20px">Unified Credit Assessment</h2>
      <p style="color:var(--gold);font-size:13px;margin-top:3px">${entity} — Tier ${tier} (${TIER_INFO[tier]?.label}) — ${assetLabel}</p>
    </div>
    <button class="btn btn-outline btn-sm" onclick="S.step='upload';render()">← Start Over</button>
  </div>

  <!-- KPI Strip -->
  <div class="card">
    <div class="card-body" style="padding:12px 16px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        ${[
          {l:'Payout Value',v:`R${fmt(payout)}`,s:`Tier ${tier}`},
          {l:'Monthly Rental',v:`R${fmt(rental)}`,s:`R${fmt(rental*12)} p.a.`},
          {l:'Asset Type',v:assetLabel,s:`≤${S.assetType==='income'?30:10}% equity`},
          {l:'Inputs',v:[S.tuResult&&'TU',S.finResult&&'Fin',S.bankResult&&'Bank'].filter(Boolean).join(' · ')||'TU only',s:'analysed'}
        ].map((item,i,arr)=>`<div style="padding:12px 14px;background:#f8fafc;${i<arr.length-1?'border-right:1px solid #e2e8f0':''}">
          <div style="font-size:10px;color:#6b7280;font-weight:600;margin-bottom:2px">${item.l}</div>
          <div style="font-size:14px;font-weight:800;color:var(--teal)">${item.v}</div>
          <div style="font-size:10px;color:#9ca3af">${item.s}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <!-- Traffic Light -->
  <div class="card">
    <div class="card-header"><h2>Module Assessment Summary</h2></div>
    <div class="card-body" style="padding:0">
      <table class="tl-table">
        <thead><tr><th>Module</th><th>Status</th><th>Key Finding</th><th>Rating</th></tr></thead>
        <tbody>
          <tr><td style="font-weight:600">TransUnion CV4B</td><td>✓ Analysed</td><td style="font-size:12px">Score ${S.tuResult?.c2_commercial??'—'} · Age ${S.tuResult?.c1_age??'—'}yr · Property: ${tuEv.hasProperty?'Yes':'No'} · ${tuEv.isClean?'Clean':'Adverse noted'}</td><td>${badge(tuStatus)}</td></tr>
          <tr><td style="font-weight:600">CCF Existing Exposure</td><td>${expEv.available?'✓ Checked':'— Not checked'}</td><td style="font-size:12px">${expEv.available?(expEv.isExisting?`${fmtR(expEv.npv)} · Bounces: ${expEv.bounceCount}`:'New client'):'Exposure lookup not completed'}</td><td>${badge(expStatus)}</td></tr>
          <tr><td style="font-weight:600">Financial Statements</td><td>${finEv.available?'✓ Analysed':'— Not provided'}</td><td style="font-size:12px">${finEv.available?`EBITDA cov: ${finEv.ebitdaCoverage??'N/A'}x · Equity: ${fmtR(finEv.equity)} · Deal: ${finEv.dealPct??'N/A'}% of equity`:'Not provided'}</td><td>${badge(finStatus)}</td></tr>
          <tr><td style="font-weight:600">Bank Statements</td><td>${bankEv.available?'✓ Analysed':'— Not provided'}</td><td style="font-size:12px">${bankEv.available?`Conduct: ${bankEv.conduct} · RDs: ${bankEv.rdCount} · Income cov: ${bankEv.coverage??'N/A'}x`:'Not provided'}</td><td>${badge(bankStatus)}</td></tr>
          <tr><td style="font-weight:600">Monday Deal Context</td><td>${dealEv.available?'✓ Linked':'— Not linked'}</td><td style="font-size:12px">${dealEv.available?dealEv.summary.join(' · '):'No deal context linked'}</td><td>${badge(dealStatus)}</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Derived Verdict -->
  <div class="${vi.cls}" style="border-radius:10px;padding:16px;margin-bottom:14px;border-width:2px;border-style:solid">
    <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;color:${vi.lc}">
      ${S.verdict ? 'Committee Verdict' : 'Derived Recommendation (editable below)'}
    </div>
    <div style="font-size:22px;font-weight:900;color:${vi.lc}">${vi.label}</div>
    ${conditions.length>0?`<div style="margin-top:10px"><div style="font-size:12px;font-weight:700;color:${vi.lc};margin-bottom:5px">Conditions:</div><ul class="conditions-list">${conditions.map(c=>`<li style="color:${vi.lc}">${c}</li>`).join('')}</ul></div>`:''}
    ${declineReasons.length>0?`<div style="margin-top:10px"><div style="font-size:12px;font-weight:700;color:#991b1b;margin-bottom:5px">Decline Reasons:</div><ul class="conditions-list">${declineReasons.map(d=>`<li style="color:#7f1d1d">${d}</li>`).join('')}</ul></div>`:''}
  </div>

  <!-- All Flags -->
  ${allFlags.length>0?`<div class="card"><div class="card-header"><h2>All Risk Flags</h2></div><div class="card-body">${allFlags.map(f=>`<div class="flag-item flag-${f.level}"><span class="flag-src src-${f.src.toLowerCase()}">${f.src}</span><span class="flag-text">${f.text}</span></div>`).join('')}</div></div>`:''}

  <!-- Analyst Recommendation -->
  <div class="card">
    <div class="card-header">
      <h2>Analyst Recommendation</h2>
      <button class="btn btn-outline btn-sm" onclick="S.synopsis='';render()">Clear</button>
    </div>
    <div class="card-body">
      <textarea id="synopsis-text" rows="5" placeholder="Edit or type your recommendation in your own voice..." oninput="S.synopsis=this.value">${S.synopsis}</textarea>
      <div class="char-count">${S.synopsis.length} characters · flows to Word export</div>
    </div>
  </div>

  <!-- Committee Verdict -->
  <div class="card">
    <div class="card-header"><h2>Committee Verdict</h2></div>
    <div class="card-body">
      <div class="verdict-btns">
        ${['approved','conditions','deferred','declined'].map(v=>{
          const labels = {approved:'✓ Approved',conditions:'⚠ Approve with Conditions',deferred:'⟳ Deferred',declined:'✕ Declined'};
          return `<button class="vbtn vbtn-${v} ${S.verdict===v?'active':''}" onclick="S.verdict=S.verdict==='${v}'?null:'${v}';render()">${labels[v]}</button>`;
        }).join('')}
      </div>
      ${S.verdict?`
        <textarea placeholder="Notes / conditions (optional)" rows="3" style="width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;resize:vertical;font-family:inherit;margin-bottom:10px" oninput="S.verdictNote=this.value">${S.verdictNote}</textarea>
        <div style="padding:10px 14px;border-radius:7px;background:${vInfo[S.verdict]?.cls.replace('verdict-','')==='approved'?'var(--green-bg)':S.verdict==='conditions'?'var(--amber-bg)':S.verdict==='deferred'?'#dbeafe':'var(--red-bg)'};border:1px solid;display:flex;align-items:center;gap:10px">
          <span style="font-size:16px;font-weight:900;color:${vInfo[S.verdict]?.lc}">${vInfo[S.verdict]?.label}</span>

        </div>

}

// WORD EXPORT (simple HTML-in-docx approach via Blob)
// ═══════════════════════════════════════════════════════════════
function downloadDocx() {
  const payout = parseFloat(S.payout), rental = parseFloat(S.rental);
  const tier = getTier(payout);
  const entity = S.entity || S.tuResult?.entity || 'Applicant';
  const assetLabel = S.assetType === 'income' ? 'Income-Generating' : 'Non-Income-Generating';
  const tuEv = evalTU(S.tuResult), bankEv = evalBank(S.bankResult, rental), finEv = evalFin(S.finResult, rental, payout, S.assetType);
  const expEv = evalExposure(S.bounceCount, S.bounceSelected, S.exposure), dealEv = evalDeal(S.dealCtx);
  const { verdict: derived, declineReasons, conditions } = deriveVerdict(tier, tuEv, bankEv, finEv, expEv, dealEv);
  const activeVerdict = S.verdict || derived;
  const vInfo = { approved:{label:'✓ APPROVED',col:'#059669'}, conditions:{label:'⚠ APPROVE WITH CONDITIONS',col:'#d97706'}, deferred:{label:'⟳ DEFERRED',col:'#2563eb'}, declined:{label:'✕ DECLINED',col:'#dc2626'} };

  <ul>${[...tuEv.flags.map(f=>({...f,src:'TU'})),...finEv.flags.map(f=>({...f,src:'Fin'})),...bankEv.flags.map(f=>({...f,src:'Bank'})),...(expEv.flags||[]).map(f=>({...f,src:'CCF'})),...(dealEv.flags||[]).map(f=>({...f,src:'Deal'}))].map(f=>`<li style="font-size:12px;color:${f.level==='red'?'#991b1b':f.level==='green'?'#065f46':'#92400e'}">[${f.src}] ${f.text}</li>`).join('')}</ul>

  const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `UnifiedCredit_${entity.replace(/\s+/g,'_')}_${new Date().toLocaleDateString('en-ZA').replace(/\//g,'-')}.doc`;

}

// MONDAY DEAL SEARCH
// ═══════════════════════════════════════════════════════════════
// Add to state initialisation — these run after S is defined:
S.mondayToken = sessionStorage.getItem('ccf_monday_token') || '';
S.dealSearch = '';
S.dealResults = [];
S.dealSearching = false;
S.dealFetchError = '';
S._mondayIdInput = '';
let _dealSearchTimer = null;

async function fetchMondayDeal() {
  const raw = (S._mondayIdInput || document.getElementById('monday-id-input')?.value || '').trim();
  if (!raw) { S.dealFetchError = 'Please paste a Monday deal URL or item ID.'; render(); return; }
  if (!S.mondayToken) { S.dealFetchError = 'Monday API token required.'; render(); return; }

  // Extract item ID from URL or use directly
  let itemId = raw;
  const urlMatch = raw.match(/pulses\/(\d+)/);
  if (urlMatch) itemId = urlMatch[1];
  if (!/^\d+$/.test(itemId)) { S.dealFetchError = 'Could not extract a valid item ID from the input.'; render(); return; }

  S.dealSearching = true; S.dealFetchError = ''; render();
  try {
    const query = `query ($itemId: ID!) {
      items(ids: [$itemId]) {
        id name
        column_values(ids: [
          "text_mm2m4nbb","email_mm2fr2bd","color_mm3k88ck","color_mm3kdj5v",
          "long_text_mm31hyds","long_text_mm323dd9","long_text_mm3258wv",
          "long_text_mm3263ks","dropdown_mm315mbh","color_mm0m3dyd","status27",
          "multiple_person_mm25xn8q","registration_no_"
        ]) { id text }
      }
    }`;
    const res = await fetch('https://api.monday.com/v2', {
      method: 'POST',
      headers: { 'Authorization': S.mondayToken, 'Content-Type': 'application/json', 'API-Version': '2024-01' },
      body: JSON.stringify({ query, variables: { itemId } })
    });
    const data = await res.json();
    const item = data.data?.items?.[0];
    if (!item) { S.dealFetchError = `No item found with ID ${itemId}. Check the URL/ID and try again.`; S.dealSearching = false; render(); return; }
    const col = id => item.column_values.find(c => c.id === id)?.text || '';
    S.dealCtx = {
      id: item.id,
      itemName: item.name,
      client: col('text_mm2m4nbb'),
      supplierEmail: col('email_mm2fr2bd'),
      riskGrade: col('color_mm3k88ck'),
      financialStrength: col('color_mm3kdj5v'),
      equipment: col('long_text_mm31hyds'),
      rental: col('long_text_mm323dd9'),
      period: col('long_text_mm3258wv'),
      escalation: col('long_text_mm3263ks'),
      approvalTerms: col('dropdown_mm315mbh'),
      evidenceTier: col('color_mm0m3dyd'),
      dealStatus: col('status27'),
      bdo: col('multiple_person_mm25xn8q'),
      regNo: col('registration_no_'),
    };
    // Auto-populate entity name if not set
    if (!S.entity && S.dealCtx.client) S.entity = S.dealCtx.client;
    // Auto-populate rental if not set
    if (!S.rental && S.dealCtx.rental) {
      const r = parseFloat(S.dealCtx.rental.replace(/[^0-9.]/g,''));
      if (!isNaN(r) && r > 0) S.rental = String(r);
    }
    S.dealResults = [];
  } catch (e) {
    S.dealFetchError = 'Monday API error: ' + e.message;
  }
  S.dealSearching = false; render();
}
  clearTimeout(_dealSearchTimer);
  if (!term || term.length < 2 || !S.mondayToken) { S.dealResults = []; render(); return; }
  _dealSearchTimer = setTimeout(() => _doMondaySearch(term), 400);
}

async function _doMondaySearch(term) {
  S.dealSearching = true; render();
  try {
    const query = `query ($boardId: ID!, $term: CompareValue!) {
      boards(ids: [$boardId]) {
        items_page(limit: 30, query_params: {
          rules: [{ column_id: "text_mm2m4nbb", compare_value: $term, operator: contains_text }]
        }) {
          items {
            id name
            column_values(ids: [
              "text_mm2m4nbb","email_mm2fr2bd","color_mm3k88ck","color_mm3kdj5v",
              "long_text_mm31hyds","long_text_mm323dd9","long_text_mm3258wv",
              "long_text_mm3263ks","dropdown_mm315mbh","color_mm0m3dyd","status27"
            ]) { id text }
          }
        }
      }
    }`;
    const res = await fetch('https://api.monday.com/v2', {
      method: 'POST',
      headers: { 'Authorization': S.mondayToken, 'Content-Type': 'application/json', 'API-Version': '2024-01' },
      body: JSON.stringify({ query, variables: { boardId: '18393867301', term } })
    });
    const data = await res.json();
    const items = data.data?.boards?.[0]?.items_page?.items || [];
    const col = (item, id) => item.column_values.find(c => c.id === id)?.text || '';
    S.dealResults = items.map(item => ({
      id: item.id, itemName: item.name,
      client: col(item,'text_mm2m4nbb'),
      supplierEmail: col(item,'email_mm2fr2bd'),
      riskGrade: col(item,'color_mm3k88ck'),
      financialStrength: col(item,'color_mm3kdj5v'),
      equipment: col(item,'long_text_mm31hyds'),
      rental: col(item,'long_text_mm323dd9'),
      period: col(item,'long_text_mm3258wv'),
      escalation: col(item,'long_text_mm3263ks'),
      approvalTerms: col(item,'dropdown_mm315mbh'),
      evidenceTier: col(item,'color_mm0m3dyd'),
      dealStatus: col(item,'status27'),
    })).filter(d => d.client);
  } catch (e) {
    console.error('Monday search error:', e);
    S.dealResults = [];
  }
  S.dealSearching = false; render();
}

function selectDeal(idx) {
  S.dealCtx = S.dealResults[idx];
  if (!S.entity) S.entity = S.dealCtx.client;
  S.dealResults = [];
  render();
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// RENTAL SUITE EXCEL PARSING
// ═══════════════════════════════════════════════════════════════
async function handleRentalSuiteUpload(file) {
  if (!file) return;
  S.rsFile = file; render();
  try {
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    // Auto-detect header row and name/NPV columns
    let headerIdx = 0, nameCol = 0, npvCol = 1;
    for (let i = 0; i < Math.min(rows.length, 6); i++) {
      const r = rows[i].map(c => String(c).toLowerCase());
      const nc = r.findIndex(c => c.includes('customer') || c.includes('client') || c.includes('name'));
      const vc = r.findIndex(c => c.includes('npv') || c.includes('balance') || c.includes('outstanding') || c.includes('exposure') || c.includes('closing'));
      if (nc >= 0 && vc >= 0) { headerIdx = i + 1; nameCol = nc; npvCol = vc; break; }
    }

    // Aggregate by client name
    const agg = {};
    for (let i = headerIdx; i < rows.length; i++) {
      const name = String(rows[i][nameCol] || '').trim();
      const raw = rows[i][npvCol];
      const npv = typeof raw === 'number' ? raw : parseFloat(String(raw).replace(/[^0-9.-]/g, '')) || 0;
      if (!name) continue;
      if (!agg[name]) agg[name] = { name, npv: 0, count: 0 };
      agg[name].npv += npv;
      agg[name].count += 1;
    }
    S.rsData = Object.values(agg).filter(r => r.npv > 0 || r.count > 0);
    S.rsSearch = '';
    S.rsResults = [];
  } catch (e) {
    console.error('Excel parse error:', e);
    S.rsData = [];
  }
  render();
}

// ── Levenshtein fuzzy match ──
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyScore(query, target) {
  const q = query.toLowerCase().trim(), t = target.toLowerCase().trim();
  if (t.includes(q)) return 0;
  const qW = q.split(/\s+/), tW = t.split(/\s+/);
  return Math.min(...tW.flatMap(tw => qW.map(qw => levenshtein(qw, tw))));
}

function searchRentalSuite(term) {
  if (!term || term.length < 2 || S.rsData.length === 0) { S.rsResults = []; return; }
  S.rsResults = S.rsData
    .map(r => ({ ...r, score: fuzzyScore(term, r.name) }))
    .filter(r => r.score <= 3)
    .sort((a, b) => a.score - b.score || b.npv - a.npv)
    .slice(0, 10);
}

function selectRsClient(idx) {
  const r = S.rsResults[idx];
  if (!r) return;
  S.exposure = { npv: r.npv, count: r.count, clientName: r.name };
  S.bounceSelected = true;
  if (!S.entity) S.entity = r.name;
  S.rsResults = [];
  render();
}
</script>
